name: Daily Critical Minerals Brief

on:
  schedule:
    # 5:00 AM UTC = 6:00 AM BST (British Summer Time)
    # Change to '0 6 * * 1-5' in winter (GMT)
    - cron: '0 5 * * 1-5'
  workflow_dispatch:

jobs:
  generate-brief:
    runs-on: ubuntu-latest
    timeout-minutes: 10

    steps:
      - name: Generate and send brief
        run: |
          cat << 'PYTHON_SCRIPT' > run_brief.py
          import json
          import os
          import time
          import smtplib
          import urllib.request
          from datetime import datetime
          from email.mime.text import MIMEText

          API_KEY = os.environ["ANTHROPIC_API_KEY"]
          GMAIL_USER = os.environ["GMAIL_USER"]
          GMAIL_PASS = os.environ["GMAIL_APP_PASSWORD"]
          today = datetime.now().strftime("%A %-d %B %Y")
          today_short = datetime.now().strftime("%a %-d %b %Y")

          def call_api(model, system, messages, use_web_search=False, attempt=0):
              tools = [{"type": "web_search_20260209", "name": "web_search", "max_uses": 5}] if use_web_search else []
              body = {"model": model, "max_tokens": 1000, "system": system, "messages": messages}
              if tools:
                  body["tools"] = tools
              req = urllib.request.Request(
                  "https://api.anthropic.com/v1/messages",
                  data=json.dumps(body).encode(),
                  headers={"x-api-key": API_KEY, "anthropic-version": "2023-06-01",
                           "content-type": "application/json"})
              try:
                  with urllib.request.urlopen(req, timeout=120) as resp:
                      return json.loads(resp.read())
              except urllib.error.HTTPError as e:
                  error_body = e.read().decode("utf-8", errors="replace")
                  print(f"HTTP {e.code}: {error_body}")
                  if e.code == 429 and attempt < 3:
                      wait = (2 ** attempt) * 20
                      print(f"Rate limited. Waiting {wait}s (retry {attempt+1}/3)...")
                      time.sleep(wait)
                      return call_api(model, system, messages, use_web_search, attempt+1)
                  raise

          def extract_text(data):
              return "\n".join(b["text"] for b in data.get("content", []) if b.get("type") == "text").strip()

          # ── STEP 1: RESEARCH ─────────────────────────────────────────────────
          # Haiku + web search. Small output, cheap.
          # Goal: get raw factual data only — prices, headlines, company names.
          print("Step 1: Researching live market data...")

          research_system = "You are a commodity market data collector. Search the web and return raw factual findings only. No analysis. No formatting beyond bullet points. Every item must include a source name and publication date."

          research_prompt = f"""Today is {today}. Search for and return raw data on these topics:

1. LME cobalt cash price today (USD/t) with source and date
2. LME copper 3-month price today (USD/t) with source and date
3. Any DRC cobalt export quota or supply policy news from the last 48 hours
4. Any Western buyer-supplier deals, MOUs, or offtake agreements in cobalt or copper from last 48 hours
5. Any Lobito Corridor developments from last 48 hours
6. Any other significant cobalt or copper supply chain news from last 48 hours

Format: plain bullet points. Source and date required for every item. Discard anything older than 48 hours."""

          messages = [{"role": "user", "content": research_prompt}]
          data = call_api("claude-haiku-4-5-20251001", research_system, messages, use_web_search=True)

          # Agentic loop for web search turns
          turn = 0
          while data.get("stop_reason") == "tool_use" and turn < 6:
              turn += 1
              print(f"  Search turn {turn}...")
              time.sleep(5)
              messages.append({"role": "assistant", "content": data["content"]})
              tool_results = [{"type": "tool_result", "tool_use_id": b["id"], "content": "completed"}
                              for b in data["content"] if b.get("type") == "tool_use"]
              messages.append({"role": "user", "content": tool_results})
              data = call_api("claude-haiku-4-5-20251001", research_system, messages, use_web_search=True)

          research = extract_text(data)
          print(f"  Research done. {len(research)} characters.")
          if research:
              print(f"  Sample: {research[:300]}")

          if len(research) < 50:
              research = f"No research data retrieved for {today}. Check web search is enabled at console.anthropic.com"

          # ── STEP 2: BRIEF WRITING ─────────────────────────────────────────────
          # Sonnet, no web search, pure writing task.
          # Takes the research text and formats it into the brief.
          print("\nStep 2: Writing brief...")
          time.sleep(10)

          brief_system = """You are the editorial writer for Lobito Intelligence Group.
Write the daily intelligence brief using only the research provided.
Do not add any information not present in the research.
Do not invent prices, companies, or events.
Write in intelligent editorial prose — specific, never generic.
The Broker's Lens must contain a non-obvious actionable insight derived from today's specific findings."""

          brief_prompt = f"""Write today's Critical Minerals Intelligence Brief from the research below.
Use only what is in the research. If a section has nothing relevant, write one sentence noting no significant developments.

TODAY: {today}

RESEARCH:
{research}

FORMAT — use exactly this structure:

Lobito Intelligence Group
Critical Minerals Intelligence
{today} · Daily Brief

PRICE SNAPSHOT
Cobalt: [exact price and source from research] — [one sentence context]
Copper: [exact price and source from research] — [one sentence context]

SUPPLY CHAIN SIGNALS
[2-3 paragraphs. Named companies, specific volumes, specific dates from research only.]

GEOPOLITICAL RISK
[1-2 paragraphs. Named actors, specific policies, specific timelines from research only.]

DEMAND DRIVERS
[1 paragraph. Named companies and programmes from research only.]

BROKER'S LENS
[3-4 sentences. What should a Western procurement director do differently THIS WEEK based on today's research? Name specific actions and timeframes. Never use 'it is worth noting' or 'the situation remains fluid'.]

—
Connecting Western buyers with responsible DRC and Copperbelt supply.
Published weekdays. Forward to a colleague in procurement, supply chain, or commodities."""

          brief_data = call_api(
              "claude-sonnet-4-6",
              brief_system,
              [{"role": "user", "content": brief_prompt}],
              use_web_search=False
          )

          brief = extract_text(brief_data)
          print(f"  Brief done. {len(brief)} characters.")

          if len(brief) < 100:
              brief = f"Brief generation failed on {today}.\n\nResearch collected:\n{research}"

          # ── STEP 3: SEND EMAIL ────────────────────────────────────────────────
          print("\nStep 3: Sending email...")
          msg = MIMEText(brief, "plain", "utf-8")
          msg["Subject"] = f"\U0001f4cb Brief ready \u2014 {today_short}"
          msg["From"] = GMAIL_USER
          msg["To"] = GMAIL_USER

          with smtplib.SMTP_SSL("smtp.gmail.com", 465) as server:
              server.login(GMAIL_USER, GMAIL_PASS)
              server.send_message(msg)

          print(f"Sent to {GMAIL_USER}")
          PYTHON_SCRIPT

          python3 run_brief.py
        env:
          ANTHROPIC_API_KEY: ${{ secrets.ANTHROPIC_API_KEY }}
          GMAIL_USER: ${{ secrets.GMAIL_USER }}
          GMAIL_APP_PASSWORD: ${{ secrets.GMAIL_APP_PASSWORD }}
