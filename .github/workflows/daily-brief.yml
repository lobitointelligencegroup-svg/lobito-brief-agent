name: Daily Critical Minerals Brief

on:
  schedule:
    # 04:00 UTC = 05:00 London (BST) / 04:00 London (GMT)
    # Running at 04:00 UTC avoids GitHub Actions peak-load queue (05:00–08:00 UTC)
    # which causes scheduled jobs to drift by up to 3–6 hours on busy mornings.
    - cron: '0 4 * * 1-5'
  workflow_dispatch:

jobs:
  generate-brief:
    runs-on: ubuntu-latest
    timeout-minutes: 15

    permissions:
      contents: write  # needed to commit used_stories.json back to repo

    steps:
      - name: Checkout repo
        uses: actions/checkout@v5

      - name: Run brief agent
        run: python3 scripts/run_brief.py
        env:
          ANTHROPIC_API_KEY: ${{ secrets.ANTHROPIC_API_KEY }}
          BRAVE_API_KEY: ${{ secrets.BRAVE_API_KEY }}
          GMAIL_USER: ${{ secrets.GMAIL_USER }}
          GMAIL_APP_PASSWORD: ${{ secrets.GMAIL_APP_PASSWORD }}

      - name: Save used stories for tomorrow's deduplication
        run: |
          if [ -f scripts/used_stories.json ]; then
            cp scripts/used_stories.json used_stories.json
          fi
          if [ -f used_stories.json ]; then
            git config user.name "github-actions[bot]"
            git config user.email "github-actions[bot]@users.noreply.github.com"
            git add used_stories.json
            git diff --staged --quiet || git commit -m "chore: update used stories [skip ci]"
            git push
          else
            echo "No used_stories.json found — skipping commit."
          fi
