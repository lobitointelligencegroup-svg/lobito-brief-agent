name: Daily Critical Minerals Brief

on:
  # workflow_dispatch is the PRIMARY trigger — fired by an external cron service
  # (cron-job.org or EasyCron) at exactly 05:00 London time via GitHub API.
  # This bypasses GitHub's scheduler queue which can delay jobs by 3-6 hours.
  #
  # External cron setup:
  #   URL:    https://api.github.com/repos/lobitointelligencegroup-svg/lobito-brief-agent/actions/workflows/daily-brief.yml/dispatches
  #   Method: POST
  #   Header: Authorization: Bearer <GITHUB_PAT>
  #   Header: Accept: application/vnd.github+json
  #   Body:   {"ref":"main"}
  #   Schedule: 04:00 UTC Mon-Fri (= 05:00 London BST / 04:00 London GMT)
  workflow_dispatch:

  # schedule trigger removed — cron-job.org via workflow_dispatch is the sole trigger.
  # Keeping the GitHub scheduler as fallback caused a duplicate brief at ~11am.
  # If cron-job.org ever misses a day, trigger manually via workflow_dispatch in GitHub UI.

jobs:
  generate-brief:
    runs-on: ubuntu-latest
    timeout-minutes: 15

    steps:
      - name: Checkout repo
        uses: actions/checkout@v5

      - name: Restore used stories from cache
        uses: actions/cache@v4
        with:
          path: used_stories.json
          key: used-stories-latest
          restore-keys: used-stories-latest

      - name: Copy restored cache into scripts directory
        run: |
          if [ -f used_stories.json ]; then
            cp used_stories.json scripts/used_stories.json
            echo "Restored used_stories.json from cache."
          else
            echo "No cached used_stories.json — first run or cache expired."
          fi

      - name: Run brief agent
        run: python3 scripts/run_brief.py
        env:
          ANTHROPIC_API_KEY: ${{ secrets.ANTHROPIC_API_KEY }}
          BRAVE_API_KEY: ${{ secrets.BRAVE_API_KEY }}
          GMAIL_USER: ${{ secrets.GMAIL_USER }}
          GMAIL_APP_PASSWORD: ${{ secrets.GMAIL_APP_PASSWORD }}

      - name: Stage used stories for cache save
        if: always()
        run: |
          if [ -f scripts/used_stories.json ]; then
            cp scripts/used_stories.json used_stories.json
            echo "used_stories.json staged for cache save."
          else
            echo "No used_stories.json written — cache will not be updated."
          fi
