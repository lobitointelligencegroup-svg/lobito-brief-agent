name: Daily Critical Minerals Brief

on:
  schedule:
    - cron: '0 5 * * 1-5'   # 6am BST (5am UTC)
  workflow_dispatch:

jobs:
  generate-brief:
    runs-on: ubuntu-latest
    timeout-minutes: 10
    permissions:
      contents: write

    steps:
      - name: Checkout repo (main)
        uses: actions/checkout@v4
        with:
          token: ${{ secrets.GITHUB_TOKEN }}

      - name: Run brief agent
        run: python3 scripts/run_brief.py
        env:
          ANTHROPIC_API_KEY:  ${{ secrets.ANTHROPIC_API_KEY }}
          BRAVE_API_KEY:      ${{ secrets.BRAVE_API_KEY }}
          GMAIL_USER:         ${{ secrets.GMAIL_USER }}
          GMAIL_APP_PASSWORD: ${{ secrets.GMAIL_APP_PASSWORD }}

      - name: Push data.json to data branch
        run: |
          git config user.name  "Lobito Brief Bot"
          git config user.email "actions@github.com"
          # Switch to (or create) the data branch
          git fetch origin data:data 2>/dev/null || git checkout --orphan data
          git checkout data 2>/dev/null || true
          # Copy the freshly written data.json onto the data branch
          git checkout main -- data.json 2>/dev/null || true
          git add data.json
          git diff --staged --quiet || git commit -m "Brief data: $(date -u '+%a %d %b %Y')"
          git push origin data
